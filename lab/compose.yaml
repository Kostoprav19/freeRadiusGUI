name: freeradiusgui

services:
  # MySQL 8.0 — schema + default accounts seeded on first boot only.
  db:
    image: mysql:8.0
    container_name: freeradiusgui-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-freeradiusgui}
      MYSQL_USER: ${MYSQL_USER:-freeradius}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-koJasmoJas2}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - db-data:/var/lib/mysql
      - ../databaseCreationScript.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
      - ./dev-seed.sql:/docker-entrypoint-initdb.d/20-dev-seed.sql:ro
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -uroot
        - -p${MYSQL_ROOT_PASSWORD:-rootpw}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # freeRadiusGUI web app (Tomcat 10.1 / Spring 6 MVC). Enabled with `--profile app`.
  # For a prod-like check, add: environment FREERADIUSGUI_REQUIRE_MOUNTS=1 (entrypoint; see docker/README.md).
  app:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: Dockerfile
    image: freeradiusgui:latest
    container_name: freeradiusgui-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m -Duser.timezone=UTC -DLOGBACK_LOG_PATH=/var/log/freeradiusgui --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED"
    volumes:
      - ./config.properties:/usr/local/tomcat/webapps/ROOT/WEB-INF/classes/config.properties:ro
      - ./freeradius/clients.conf:/etc/freeradius/clients.conf:ro
      - ./freeradius/users:/etc/freeradius/users:ro
      - radius-logs:/var/log/freeradius/radacct
      - app-logs:/var/log/freeradiusgui

  # FreeRADIUS 3.2 server with overrides so the GUI's Logs page can parse its output.
  freeradius:
    profiles: ["app"]
    build:
      context: ./freeradius
      dockerfile: Dockerfile.freeradius
    image: freeradiusgui-radius:latest
    container_name: freeradiusgui-radius
    restart: unless-stopped
    command: ["-X"]
    ports:
      - "${RADIUS_AUTH_PORT:-1812}:1812/udp"
      - "${RADIUS_ACCT_PORT:-1813}:1813/udp"
    volumes:
      - ./freeradius/clients.conf:/etc/raddb/clients.conf:ro
      - ./freeradius/users:/etc/raddb/mods-config/files/authorize:ro
      - radius-logs:/var/log/freeradius/radacct

  # radclient loop — generates steady auth traffic for the Logs page.
  radclient:
    profiles: ["app"]
    image: freeradius/freeradius-server:latest-3.2
    container_name: freeradiusgui-radclient
    restart: unless-stopped
    depends_on:
      - freeradius
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 5
        while :; do
          radclient -c 1 -r 1 freeradius:1812 auth testing123 < /requests.txt || true
          sleep ${RADCLIENT_INTERVAL:-5}
        done
    volumes:
      - ./freeradius/requests.txt:/requests.txt:ro

volumes:
  db-data:
  radius-logs:
  app-logs:
