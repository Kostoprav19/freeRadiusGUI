#----- PATH TO FREERADIUS CONFIG AND LOG FILES ---
#Path to freeradius users file
usersfilepath = /etc/freeradius/users
#Path to freeradius clients.conf file
clientsfilepath = /etc/freeradius/clients.conf
#Path to freeradius log files
logfilesdirpath = /var/log/freeradius/radacct

#----- DATABASE -----
# Host is `db` — the service name inside the compose network.
dbDriverClass = com.mysql.cj.jdbc.Driver
dbUrl = jdbc:mysql://db:3306/freeradiusgui?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
dbUser = freeradius
dbPassword = koJasmoJas2
dbMinPoolSize = 5
dbMaxPoolSize = 20
dbCheckoutTimeout = 1800

#----- MAIL -----
# Lab override: packaged default is 10.0.0.100 which blackholes TCP in the
# compose network and adds ~2min to startup (see StartupListener →
# LogService#loadFromFileToday → ServerService#setTodayRejected when the
# radclient loop has already produced Reject logs for today). Point at
# the unreachable-but-fast-fail localhost:25 so connect() returns
# "connection refused" immediately instead of timing out.
mailFrom = freeradius1@local
mailTo = help@local
mailSmtpServer = localhost
