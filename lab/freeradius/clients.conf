# Minimal clients.conf for the compose-based dev stack.
# Bind-mounted over /etc/raddb/clients.conf in the freeradius container.
# Accepts any client on the compose network with a shared secret.

client dockernet {
    ipaddr = 172.16.0.0/12
    secret = testing123
    shortname = dockernet
}

client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    shortname = localhost
}
