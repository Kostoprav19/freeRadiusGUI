#----- PATH TO FREERADIUS CONFIG AND LOG FILES ---
#Path to freeradius users file
usersfilepath = /etc/freeradius/users
#Path to freeradius clients.conf file
clientsfilepath = /etc/freeradius/clients.conf
#Path to freeradius log files
logfilesdirpath = /var/log/freeradius/radacct

#----- DATABASE -----
dbDriverClass = com.mysql.cj.jdbc.Driver
dbUrl = jdbc:mysql://localhost:3306/freeradiusgui?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
dbUser = freeradius
dbPassword = koJasmoJas2
dbMinPoolSize = 5
dbMaxPoolSize = 20
dbCheckoutTimeout = 1800

#----- MAIL -----
# Rejected-RADIUS-request notifications are opt-in. Set mailEnabled = true
# to send them; defaults to false (skips SMTP setup at startup and
# short-circuits sendMail() to a no-op).
mailEnabled = false
mailFrom = freeradius1@local
mailTo = help@local
mailSmtpServer = 10.0.0.100
